services:
  geokode:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data:ro
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
